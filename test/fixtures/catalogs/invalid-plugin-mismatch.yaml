schemaVersion: 1
catalog:
  id: artifact-chain-assistant
  version: "0.2.0"
entries:
  - ref: artifact.prd-feature.author
    provider:
      scope: plugin
      plugin: wrong-plugin-name
      skill: prd-feature-flow-author
    kind: workflow
    summary: "Author or revise PRD feature requirements"
    match:
      domains: [artifact]
      artifactTypes: [feature]
      intents: [author]
    accepts: [objective]
    produces: [prd-feature]
    sideEffects: [write-project-artifacts]
